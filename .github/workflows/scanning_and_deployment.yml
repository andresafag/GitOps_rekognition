name: "Scans and Deployment Pipeline"

on:
  push:
    branches: [ "main" ]

jobs:
  # -----------------------------
  # Continuous Integration (CI)
  # - static analysis, security scans, and build artifact creation
  # -----------------------------
  Analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: javascript-typescript
          build-mode: none
        - language: python
          build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

  Security:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    needs: Analyze
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Snyk IaC (Terraform) Scan
        uses: snyk/actions/iac@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk-iac.sarif

      - name: Snyk Code (SAST) Scan
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high --sarif-file-output=snyk-code.sarif

      - name: Snyk Open Source Scan
        uses: snyk/actions/python@master
        continue-on-error: true 
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --severity-threshold=high --sarif-file-output=snyk-oss.sarif

      - name: Check SARIF files
        id: check-sarif
        run: |
          if [ -f snyk-iac.sarif ]; then echo "iac_exists=true" >> $GITHUB_OUTPUT; else echo "iac_exists=false" >> $GITHUB_OUTPUT; fi
          if [ -f snyk-code.sarif ]; then echo "code_exists=true" >> $GITHUB_OUTPUT; else echo "code_exists=false" >> $GITHUB_OUTPUT; fi
          if [ -f snyk-oss.sarif ]; then echo "oss_exists=true" >> $GITHUB_OUTPUT; else echo "oss_exists=false" >> $GITHUB_OUTPUT; fi

      - name: Upload Snyk IaC SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && steps.check-sarif.outputs.iac_exists == 'true' }}
        with:
          sarif_file: snyk-iac.sarif
          category: snyk-iac

      - name: Upload Snyk Code SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && steps.check-sarif.outputs.code_exists == 'true' }}
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Upload Snyk Open Source SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: ${{ always() && steps.check-sarif.outputs.oss_exists == 'true' }}
        with:
          sarif_file: snyk-oss.sarif
          category: snyk-oss

  Zip_files:
    name: Zip Lambda Files
    runs-on: ubuntu-latest
    needs: Security
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Zip Lambda Functions
        run: |
          mkdir -p infrastructure/lambda
          cd lambda/pre_signed_url
          zip -r ../../infrastructure/lambda/pre_signed_url.zip .
          cd ../../

          cd lambda/rekognition_consumer
          zip -r ../../infrastructure/lambda/rekognition_consumer.zip .
          cd ../../
          echo "Lambda functions zipped successfully."

  # -----------------------------
  # Continuous Deployment (CD)
  # - application staging deployment, promotion to production,
  #   and infrastructure (Terraform) deployment
  # -----------------------------
  deploy-staging:
    name: Deploy App -> Staging
    runs-on: ubuntu-latest
    needs: IaC
    env:
      STAGING_BUCKET: ${{ secrets.STAGING_BUCKET_NAME }}
      AWS_REGION: us-east-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Sync src to staging S3
        run: |
          aws s3 sync src s3://${{ env.STAGING_BUCKET }} --exclude "config.js" --delete

      - name: Basic validation checks
        run: |
          aws s3 ls s3://${{ env.STAGING_BUCKET }}/index.html || (echo "index.html missing in staging" && exit 1)

  promote-prod:
    name: Promote Staging -> Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    env:
      STAGING_BUCKET: ${{ secrets.STAGING_BUCKET_NAME }}
      PROD_BUCKET: ${{ secrets.PROD_BUCKET_NAME }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
      AWS_REGION: us-east-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Sync staging -> production S3
        run: |
          aws s3 sync s3://${{ env.STAGING_BUCKET }} s3://${{ env.PROD_BUCKET }} --delete

      - name: Create CloudFront invalidation
        if: ${{ env.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"

  IaC:
    name: Terraform 
    runs-on: ubuntu-latest
    needs: Zip_files
    permissions: 
      id-token: write
      contents: read
    env:
      TF_WORKING_DIR: infrastructure
      AWS_REGION: us-east-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # - name: Terraform taint
      #   working-directory: ${{ env.TF_WORKING_DIR }}
      #   run: terraform taint module.ec2.aws_instance.prometheus

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -parallelism=20 --auto-approve
    