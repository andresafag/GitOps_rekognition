<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rekognition Upload</title>
  <link type="image/png" sizes="32x32" rel="icon" href="reconocimiento.png">
  <script src="nav.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/compressorjs@1.3.0/dist/compressor.min.js"></script>
  <script src="config.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div id="navbar-placeholder"></div>
    <h1>🖼️ AI Text Analyzer</h1>
    <p>Discover what's in your text with advanced AI detection</p>
  </header>

  <section class="hero">
    <div class="carousel">
      <div class="carousel-container">
        <div class="carousel-slide active">
          <img src="https://picsum.photos/600/400?random=1" alt="Sample image 1">
          <div class="carousel-caption">Upload your images for instant analysis</div>
        </div>
        <div class="carousel-slide">
          <img src="https://picsum.photos/600/400?random=2" alt="Sample image 2">
          <div class="carousel-caption">Detect labels, objects, and scenes</div>
        </div>
        <div class="carousel-slide">
          <img src="https://picsum.photos/600/400?random=3" alt="Sample image 3">
          <div class="carousel-caption">Recognize celebrities and faces</div>
        </div>
      </div>
      <button class="carousel-btn prev">❮</button>
      <button class="carousel-btn next">❯</button>
      <div class="carousel-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>
  </section>

  <main>
    <section class="upload-section">
      <h2>Detect the text in your image</h2>

      <label class="file-upload">
        <input type="file" id="fileInput" accept="image/jpeg,image/png" />
        <div class="upload-area">
          <div class="upload-icon">📁</div>
          <div class="upload-text">Choose an image with text or drag & drop</div>
          <div class="upload-hint">ℹ️ Only JPEG and PNG formats supported, up to 10MB</div>
        </div>
      </label>
      <button id="uploadButton" disabled>🚀 Analyze text</button>
      <div id="status" class="status-message"></div>
    </section>

    <section id="results" class="results-section" style="display: none;">
      <h2>🎉 Analysis Complete!</h2>
      <div class="results-content">
        <div class="image-preview">
          <img id="uploadedImage" alt="Analyzed image" />
          <div id="textData"></div>
        </div>
        <div id="analysisData" class="analysis-results"></div>
      </div>
    </section>
  </main>
  <script src="detext.js" defer></script>
  <script src="site.js"></script>
</body>
</html>
